name: Build WscScreen APK

on:
  push:
    tags: ['v*']
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Download gradle-wrapper.jar
        run: |
          GRADLE_VERSION=8.6
          JAR_URL="https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}.0/gradle/wrapper/gradle-wrapper.jar"
          curl -sSfL "$JAR_URL" -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Sign Release APK
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=app/keystore.jks \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      - name: Rename APKs
        run: |
          TAG="${{ github.ref_name }}"
          DEBUG=$(find app/build/outputs/apk/debug   -name '*.apk' 2>/dev/null | head -1)
          RELEASE=$(find app/build/outputs/apk/release -name '*.apk' 2>/dev/null | head -1)
          [ -f "$DEBUG" ]   && cp "$DEBUG"   "WscScreen-${TAG}-debug.apk"
          [ -f "$RELEASE" ] && cp "$RELEASE" "WscScreen-${TAG}-release.apk"
          ls -lh WscScreen-*.apk || echo "No APKs renamed yet"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WscScreen-APK-${{ github.ref_name }}
          path: 'WscScreen-*.apk'
          retention-days: 30
          if-no-files-found: error

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: 'WscScreen-*.apk'
          body: |
            ## WscScreen ${{ github.ref_name }} — Display Screen Receiver

            APK Android natif pour **Android TV Box / Smart TV**

            | Fichier | Usage |
            |---|---|
            | `*-debug.apk` | Tests & développement |
            | `*-release.apk` | Production (si keystore configuré) |

            ### Installation rapide
            ```bash
            adb install WscScreen-${{ github.ref_name }}-debug.apk
            ```
            Ou copier l'APK sur la TV Box → installer via gestionnaire de fichiers.

            ### Secrets GitHub requis pour le build release
            `ANDROID_KEYSTORE_BASE64` · `ANDROID_KEY_ALIAS` · `ANDROID_KEY_PASSWORD` · `ANDROID_STORE_PASSWORD`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
